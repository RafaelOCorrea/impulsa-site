<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impulsa | Diagnóstico Gratuito</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--navy);">

    <nav>
        <div class="container nav-content" style="display: flex; justify-content: center; align-items: center; padding: 15px 20px;">
            <a href="index.html">
                <img src="Impulsa_logo.png" alt="Impulsa Farma" style="height: 60px; width: auto;">
            </a>
        </div>
    </nav>

    <section class="section-blue" style="min-height: 80vh; display: flex; align-items: center;">
        <div class="container about-text-centered">
            <h1 class="white-text" style="font-size: 2.5rem; margin-bottom: 20px;">Garanta o seu <span class="gold-text">Diagnóstico Gratuito</span></h1>
            <p class="white-text" style="margin-bottom: 40px; font-size: 1.1rem; opacity: 0.9;">
                Temos vagas limitadas para a auditoria de XMLs sem custo. Descubra hoje se a sua farmácia está pagando impostos indevidos.
            </p>
            
            <div class="form-container">
                <form action="https://formspree.io/f/xwvwrwvz" method="POST" class="impulsa-form">
                    <div class="input-group"><input type="text" name="Escritorio" placeholder="Nome do Escritório" required></div>
                    <div class="input-group"><input type="text" name="Nome" placeholder="Seu Nome" required></div>
                    <div class="input-group"><input type="email" name="Email" placeholder="E-mail Profissional" required></div>
                    <div class="input-group"><input type="tel" name="Telefone" placeholder="WhatsApp" required></div>
    
                     <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer;">Agendar Demonstração</button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
